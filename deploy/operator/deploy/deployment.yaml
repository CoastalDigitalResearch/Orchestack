---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestack-operator
  namespace: orchestack-system
  labels:
    app.kubernetes.io/name: orchestack-operator
    app.kubernetes.io/part-of: orchestack
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestack-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestack-operator
        app.kubernetes.io/part-of: orchestack
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: orchestack-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      containers:
        - name: operator
          image: ghcr.io/coastaldigitalresearch/orchestack-operator:latest
          args:
            - --leader-elect=true
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
