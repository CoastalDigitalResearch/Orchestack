---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: orchestackplatforms.orchestack.io
  annotations:
    controller-gen.kubebuilder.io/version: "(hand-written)"
spec:
  group: orchestack.io
  names:
    kind: OrchestackPlatform
    listKind: OrchestackPlatformList
    plural: orchestackplatforms
    singular: orchestackplatform
    shortNames:
      - osp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
        scale:
          specReplicasPath: .spec.services.task-dispatcher.replicas
          statusReplicasPath: .status.services.task-dispatcher.replicas
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: OrchestackPlatform is the top-level custom resource that describes
            a desired Orchestack deployment.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: OrchestackPlatformSpec defines the desired state of the platform.
              type: object
              required:
                - version
              properties:
                version:
                  description: Version of the Orchestack platform to deploy.
                  type: string
                  minLength: 1
                services:
                  description: Core Orchestack micro-services. Keys are service names.
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      replicas:
                        type: integer
                        format: int32
                        minimum: 0
                        default: 1
                      image:
                        type: string
                      resources:
                        description: CPU/memory requests and limits.
                        type: object
                        properties:
                          limits:
                            type: object
                            additionalProperties:
                              anyOf:
                                - type: integer
                                - type: string
                              x-kubernetes-int-or-string: true
                          requests:
                            type: object
                            additionalProperties:
                              anyOf:
                                - type: integer
                                - type: string
                              x-kubernetes-int-or-string: true
                connectors:
                  description: Optional external-system connector sidecars.
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        default: false
                      replicas:
                        type: integer
                        format: int32
                        minimum: 0
                        default: 1
                      image:
                        type: string
                nats:
                  description: NATS message-bus configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    jetstream:
                      type: boolean
                      default: true
                postgres:
                  description: PostgreSQL configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    existingSecret:
                      description: Reference to a pre-existing Secret with connection credentials.
                      type: string
                minio:
                  description: S3-compatible object store configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    persistence:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        storageClassName:
                          type: string
                        size:
                          type: string
                          default: "10Gi"
                vault:
                  description: HashiCorp Vault integration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    externalAddr:
                      description: Address of an existing Vault instance.
                      type: string
                openshift:
                  description: OpenShift-specific settings.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    route:
                      type: boolean
            status:
              description: OrchestackPlatformStatus describes the observed state.
              type: object
              properties:
                phase:
                  description: High-level lifecycle state.
                  type: string
                  enum:
                    - Pending
                    - Deploying
                    - Running
                    - Degraded
                    - Failed
                conditions:
                  description: Detailed machine-readable status signals.
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: "^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$"
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: "^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$"
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                services:
                  description: Observed status of each service.
                  type: object
                  additionalProperties:
                    type: object
                    required:
                      - ready
                      - replicas
                      - readyReplicas
                    properties:
                      ready:
                        type: boolean
                      replicas:
                        type: integer
                        format: int32
                      readyReplicas:
                        type: integer
                        format: int32
                      message:
                        type: string
                observedGeneration:
                  type: integer
                  format: int64
                lastReconciled:
                  type: string
                  format: date-time
