# Orchestack Development Stack
# Usage: docker compose -f deploy/compose/docker-compose.yml up

x-common-env: &common-env
  NATS_URL: nats://nats:4222
  DATABASE_URL: postgres://orchestack:orchestack-dev@postgres:5432/orchestack?sslmode=disable
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: orchestack
  MINIO_SECRET_KEY: orchestack-dev
  VAULT_ADDR: http://vault:8200
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

x-healthcheck: &healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-service-depends: &service-depends
  db-migrate:
    condition: service_completed_successfully
  nats-init:
    condition: service_completed_successfully

services:
  # ===========================================================================
  # Infrastructure
  # ===========================================================================
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data", "-p", "4222", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orchestack
      POSTGRES_USER: orchestack
      POSTGRES_PASSWORD: orchestack-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestack -d orchestack"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: orchestack
      MINIO_ROOT_PASSWORD: orchestack-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Init jobs
  # ---------------------------------------------------------------------------
  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - ./nats-init.sh:/nats-init.sh:ro
    command: ["/bin/sh", "/nats-init.sh"]
    restart: "no"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 orchestack orchestack-dev;
      mc mb --ignore-existing local/homarus-memory;
      mc mb --ignore-existing local/homarus-artifacts;
      mc mb --ignore-existing local/homarus-audit-export;
      echo 'Buckets created';
      exit 0;
      "

  db-migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../migrations:/migrations:ro
    entrypoint: >
      /bin/sh -c "
      for f in /migrations/2026*.sql; do
        echo \"Applying $$f ...\";
        PGPASSWORD=orchestack-dev psql -h postgres -U orchestack -d orchestack -f $$f || true;
      done;
      echo 'All migrations applied';
      "
    restart: "no"

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: orchestack-dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault-init:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: orchestack-dev-token
    volumes:
      - ./vault-init.sh:/vault-init.sh:ro
    entrypoint: ["/bin/sh", "/vault-init.sh"]
    restart: "no"

  otel-collector:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
    restart: unless-stopped

  # ===========================================================================
  # Go services
  # ===========================================================================
  session-scheduler:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.go
      args:
        SERVICE: session-scheduler
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      <<: *healthcheck
    restart: unless-stopped

  task-dispatcher:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.go
      args:
        SERVICE: task-dispatcher
    ports:
      - "8081:8080"
    environment:
      <<: *common-env
      POLICY_EVALUATOR_URL: http://policy-evaluator:8080
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      <<: *healthcheck
    restart: unless-stopped

  policy-evaluator:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.go
      args:
        SERVICE: policy-evaluator
    ports:
      - "8082:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      <<: *healthcheck
    restart: unless-stopped

  daytona-executor:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.go
      args:
        SERVICE: daytona-executor
    ports:
      - "8083:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      <<: *healthcheck
    restart: unless-stopped

  extension-controller:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.go
      args:
        SERVICE: extension-controller
    ports:
      - "8084:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      <<: *healthcheck
    restart: unless-stopped

  # ===========================================================================
  # Python services
  # ===========================================================================
  loop-runner:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.python
      args:
        SERVICE: loop-runner
    ports:
      - "8090:8080"
    environment:
      <<: *common-env
      MODEL_ROUTER_URL: http://model-router:8080
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped

  model-router:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.python
      args:
        SERVICE: model-router
    ports:
      - "8091:8080"
    environment:
      <<: *common-env
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}
      OPENCODE_ZEN_BASE_URL: ${OPENCODE_ZEN_BASE_URL:-https://opencode.ai/zen/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped

  budget-accounting:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.python
      args:
        SERVICE: budget-accounting
    ports:
      - "8092:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped

  memory-plane:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.python
      args:
        SERVICE: memory-plane
    ports:
      - "8093:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped

  dlp-scanner:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.python
      args:
        SERVICE: dlp-scanner
    ports:
      - "8094:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped

  # ===========================================================================
  # Connectors
  # ===========================================================================
  connector-webchat:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.connector
      args:
        CONNECTOR: webchat
    ports:
      - "8104:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped

  connector-discord:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.connector
      args:
        CONNECTOR: discord
    ports:
      - "8100:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped
    profiles:
      - connectors

  connector-slack:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.connector
      args:
        CONNECTOR: slack
    ports:
      - "8101:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped
    profiles:
      - connectors

  connector-email:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.connector
      args:
        CONNECTOR: email
    ports:
      - "8102:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped
    profiles:
      - connectors

  connector-telegram:
    build:
      context: ../../
      dockerfile: deploy/compose/Containerfile.connector
      args:
        CONNECTOR: telegram
    ports:
      - "8103:8080"
    environment:
      <<: *common-env
    depends_on:
      <<: *service-depends
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      <<: *healthcheck
    restart: unless-stopped
    profiles:
      - connectors

volumes:
  nats-data:
  postgres-data:
  minio-data:
