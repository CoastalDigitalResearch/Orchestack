apiVersion: v2
name: orchestack
description: Orchestack AI Agent Orchestration Platform
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - ai
  - agents
  - orchestration
  - nats
  - kubernetes
  - openshift
maintainers:
  - name: Coastal Digital Research
dependencies:
  - name: nats
    version: "1.2.*"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled
  - name: postgresql
    version: "15.*"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: minio
    version: "5.*"
    repository: "https://charts.min.io/"
    condition: minio.enabled
