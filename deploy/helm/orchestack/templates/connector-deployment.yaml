{{/*
Deployment template for Orchestack connectors.
Only renders connectors that have enabled: true.
*/}}
{{- range $name, $conn := .Values.connectors }}
{{- if $conn.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestack.fullname" $ }}-{{ $name }}
  labels:
    {{- include "orchestack.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: connector
spec:
  replicas: {{ $conn.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/part-of: orchestack
    spec:
      securityContext:
        {{- include "orchestack.securityContext" $ | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: "{{ if $.Values.global.imageRegistry }}{{ $.Values.global.imageRegistry }}/{{ end }}{{ $conn.image.repository }}:{{ $conn.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "orchestack.containerSecurityContext" $ | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- include "orchestack.commonEnv" $ | nindent 12 }}
            - name: OTEL_SERVICE_NAME
              value: connector-{{ $name }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- if $conn.resources }}
          resources:
            {{- toYaml $conn.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchestack.fullname" $ }}-{{ $name }}
  labels:
    {{- include "orchestack.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
{{- end }}
