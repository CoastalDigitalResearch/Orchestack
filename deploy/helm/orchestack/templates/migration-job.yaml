---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "orchestack.fullname" . }}-migrate
  labels:
    {{- include "orchestack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migration
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        {{- include "orchestack.securityContext" . | nindent 8 }}
      containers:
        - name: migrate
          image: postgres:16-alpine
          securityContext:
            {{- include "orchestack.containerSecurityContext" . | nindent 12 }}
          command: ["/bin/sh", "/migrations/init.sh"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "orchestack.fullname" . }}-db
                  key: url
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: migrations
          configMap:
            name: {{ include "orchestack.fullname" . }}-migrations
        - name: tmp
          emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "orchestack.fullname" . }}-nats-init
  labels:
    {{- include "orchestack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        {{- include "orchestack.securityContext" . | nindent 8 }}
      containers:
        - name: nats-init
          image: natsio/nats-box:latest
          securityContext:
            {{- include "orchestack.containerSecurityContext" . | nindent 12 }}
          command: ["/bin/sh", "/scripts/nats-init.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: {{ include "orchestack.fullname" . }}-nats-init
